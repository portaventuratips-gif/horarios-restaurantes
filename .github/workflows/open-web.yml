name: Abrir web cada ~5 min

on:
  schedule:
    - cron: '*/5 * * * *'       # Intenta cada 5 min (mínimo permitido)
  workflow_dispatch:            # Para probar manualmente desde la web

jobs:
  abrir:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'   # o 3.12

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install selenium webdriver-manager

      - name: Ejecutar Selenium
        env:
          TARGET_URL: ${{ secrets.TARGET_URL }}   # pon tu URL en Secrets (recomendado)
        run: python -c "
import time
from selenium import webdriver
from selenium.webdriver.chrome.service import Service
from selenium.webdriver.chrome.options import Options
from webdriver_manager.chrome import ChromeDriverManager

options = Options()
options.add_argument('--headless=new')
options.add_argument('--no-sandbox')
options.add_argument('--disable-dev-shm-usage')
options.add_argument('--disable-gpu')
options.add_argument('user-agent=Mozilla/5.0 ...')  # opcional

service = Service(ChromeDriverManager().install())
driver = webdriver.Chrome(service=service, options=options)

try:
    url = '$TARGET_URL' or 'https://example.com'
    print(f'[{time.strftime(\"%H:%M:%S\")}] Abriendo {url}')
    driver.get(url)
    time.sleep(5)  # espera carga
    print('Título:', driver.title)
except Exception as e:
    print('Error:', str(e))
finally:
    driver.quit()
