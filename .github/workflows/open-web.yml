- name: Generar y subir JSON de prueba
  env:
    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    REPO: ${{ github.repository }}
    FILE_PATH: horarios-prueba.json
    BRANCH: main
  run: |
    cat <<'EOF' > script.py
import os
import json
import base64
import requests
from datetime import datetime

data = {'mensaje': 'hola'}
json_content = json.dumps(data, indent=2)

token = os.getenv('GITHUB_TOKEN')
repo = os.getenv('REPO')
file_path = os.getenv('FILE_PATH')
branch = os.getenv('BRANCH')

url = f'https://api.github.com/repos/{repo}/contents/{file_path}'
headers = {'Authorization': f'token {token}'}
r = requests.get(url, headers=headers, params={'ref': branch})
sha = r.json().get('sha') if r.ok else None

payload = {
    'message': f'Prueba JSON {datetime.utcnow().isoformat()}',
    'content': base64.b64encode(json_content.encode()).decode(),
    'branch': branch
}
if sha:
    payload['sha'] = sha

r = requests.put(url, headers=headers, json=payload)
r.raise_for_status()
print('JSON de prueba actualizado correctamente')
EOF

    python script.py
