name: Generar JSON de prueba cada 5 minutos

on:
  schedule:
    - cron: '*/5 * * * *'  # Cada 5 minutos
  workflow_dispatch:        # Permite ejecución manual

jobs:
  crear-json:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Necesario para hacer commit

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Crear archivo JSON de prueba
        run: |
          echo "{\"mensaje\": \"Hola\"}" > prueba.json

      - name: Commit y Push del JSON
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add prueba.json
          # Solo comitea si hay cambios
          git diff --quiet && git diff --staged --quiet || git commit -m "Actualizar prueba.json: $(date)"
          git push
