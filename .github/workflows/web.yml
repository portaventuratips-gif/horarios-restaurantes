name: Escribir JSON de prueba

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

jobs:
  escribir-json:
    runs-on: ubuntu-latest

    steps:
      - name: Crear JSON de prueba y subir a GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          FILE_PATH: prueba.json
          BRANCH: main
        run: |
          python -c "import os, json, base64, requests, datetime as dt;
data={'mensaje':'Hola'};
json_content=json.dumps(data, indent=2);
token=os.getenv('GITHUB_TOKEN');
repo=os.getenv('REPO');
file_path=os.getenv('FILE_PATH');
branch=os.getenv('BRANCH');
url=f'https://api.github.com/repos/{repo}/contents/{file_path}';
headers={'Authorization':f'token {token}'};
r=requests.get(url, headers=headers, params={'ref':branch});
sha=r.json().get('sha') if r.ok else None;
payload={'message':f'Actualizar prueba.json {dt.datetime.utcnow().isoformat()}','content':base64.b64encode(json_content.encode()).decode(),'branch':branch};
if sha: payload['sha']=sha;
r=requests.put(url, headers=headers, json=payload);
r.raise_for_status();
print('JSON prueba.json actualizado correctamente')"
