name: Generar JSON de horarios

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  generar-horarios:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Instalar jq y curl
        run: sudo apt-get update && sudo apt-get install -y jq curl

      - name: Generar JSON de horarios
        env:
          API_KEY: ${{ secrets.API_KEY }}
          API_URL: https://api.adventurelabs.xyz/restaurants/
          FILE_PATH: horarios.json
        run: |
          response=$(curl -s -H "x-api-key: $API_KEY" "$API_URL")

          jq -n --arg fecha "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" --argjson data "$response" '
            # Mapa de nombres
            $nombreMap = {
              "Aloha":"Aloha","Altai":"Altai","Augustu'\''s Biergarten":"Augustu'\''s Biergarten",
              "Beach Bar":"Beach Bar","Ben & Jerrys":"Ben & Jerrys","Black Smith":"Black Smith",
              "Bora Bora":"Bora Bora","Bufalo":"Bufalo","Cactus Express":"Cactus Express",
              "Café Saula":"Café Saula","Cafetería Bora Bora":"Cafetería Bora Bora","Canton":"Canton",
              "Captain'\''s Refuge":"Captain'\''s Refuge","Cerveseria L'\''Estació":"Cerveseria L'\''Estació",
              "Chickens'\'' Stampida":"Chickens'\'' Stampida","Cookie Monster Corner":"Cookie Monster Corner",
              "Dagana":"Dagana","Dakini":"Dakini","Economato":"Economato","El Kaktus":"El Kaktus",
              "El Molino":"El Molino","El Posit":"El Posit","Erawan":"Erawan","Finish Line":"Finish Line",
              "Focacceria":"Focacceria","Fresh Island":"Fresh Island","Gran Caribe":"Gran Caribe",
              "Grand Canyon Drinks":"Grand Canyon Drinks","Hacienda El Charro":"Hacienda El Charro",
              "Happiness Station Caribe":"Happiness Station Caribe","Happiness Station China":"Happiness Station China",
              "Heladería Carte D'\''or":"Heladería Carte D'\''or","Hot Dogs":"Hot Dogs","Ice Cream Box":"Ice Cream Box",
              "Jeremias'\'' Food":"Jeremias'\'' Food","Jiangsu":"Jiangsu","King Kamehameha":"King Kamehameha",
              "La Cabaña":"La Cabaña","La Cantina":"La Cantina","La Cantonada":"La Cantonada","La Cara":"La Cara",
              "La Cocina de Epi":"La Cocina de Epi","La Glorieta - You by Danone":"La Glorieta - You by Danone",
              "La Laguna de Woody":"La Laguna de Woody","LaLiga TwentyNine'\''s":"LaLiga TwentyNine'\''s",
              "Loggers Creppe  - You by Danone":"Loggers Creppe  - You by Danone","Long Branch Saloon":"Long Branch Saloon",
              "Marco Polo":"Marco Polo","Moll Vell":"Moll Vell","Paddock":"Paddock","Palma Real":"Palma Real",
              "Pit Lane":"Pit Lane","Racó de Mar":"Racó de Mar","Reggae Café":"Reggae Café","Sichuan":"Sichuan",
              "Spirello":"Spirello","Stop&Go":"Stop & Go","Stunt Pop Corn":"Stunt Pop Corn","Sweet House":"Sweet House by Nutella",
              "Taquería La Catrina":"Taquería La Catrina","The Iron Horse":"The Iron Horse","The Old Steak House":"The Old Steak House",
              "The Surfer":"The Surfer","Tropical Juice":"Tropical Juice","Vinosfera Tapes i Vins":"Vinosfera Tapes i Vins",
              "Waitan":"Waitan","Zona Indoor - El Gran Caribe":"Zona Indoor - El Gran Caribe"
            };

            {
              fecha: $fecha,
              restaurantes: ($data | map({
                ($nombreMap[.name] // .name): (.schedule // [] | map("\(.open) - \(.close)") | join(" y "))
              }) | add)
            }
          ' > $FILE_PATH

          echo "JSON generado en $FILE_PATH"

      - name: Commit y push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add horarios.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Actualizar horarios: $(date -u)"
          git push
