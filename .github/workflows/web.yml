name: Generar JSON de horarios

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  generar-horarios:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Instalar jq
        run: sudo apt-get update && sudo apt-get install -y jq curl

      - name: Generar JSON de horarios
        env:
          API_KEY: ${{ secrets.API_KEY }}
          API_URL: https://api.adventurelabs.xyz/restaurants/
          FILE_PATH: horarios.json
        run: |
          # Descargar datos de la API
          response=$(curl -s -H "x-api-key: $API_KEY" $API_URL)
          
          # Mapeo simplificado de nombres
          declare -A nombre_map
          nombre_map["Aloha"]="Aloha"
          nombre_map["Altai"]="Altai"
          nombre_map["Augustu's Biergarten"]="Augustu's Biergarten"
          nombre_map["Beach Bar"]="Beach Bar"
          nombre_map["Ben & Jerrys"]="Ben & Jerrys"
          # Puedes añadir todos los demás aquí...

          # Construir JSON
          echo -n '{"fecha":"'"$(date -u +"%Y-%m-%dT%H:%M:%SZ")"'","restaurantes":{' > $FILE_PATH
          
          first=1
          echo "$response" | jq -c '.[]' | while read shop; do
            name=$(echo "$shop" | jq -r '.name')
            schedule=$(echo "$shop" | jq -c '.schedule')
            # Aplicar mapeo
            mapped=${nombre_map[$name]:-$name}
            # Formatear horarios
            if [ "$schedule" != "null" ] && [ "$schedule" != "[]" ]; then
              hours=$(echo "$schedule" | jq -r 'map("\(.open) - \(.close)") | join(" y ")')
            else
              hours=""
            fi
            # Coma solo si no es el primer elemento
            if [ $first -eq 1 ]; then
              first=0
            else
              echo -n "," >> $FILE_PATH
            fi
            # Escapar nombre
            name_escaped=$(echo $mapped | sed 's/"/\\"/g')
            echo -n "\"$name_escaped\":\"$hours\"" >> $FILE_PATH
          done

          echo "}" >> $FILE_PATH
          echo "JSON generado en $FILE_PATH"

      - name: Commit y Push del JSON
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add horarios.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Actualizar horarios: $(date)"
          git push
