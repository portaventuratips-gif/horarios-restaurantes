name: Generar JSON cada 5 minutos

on:
  schedule:
    # Corre cada 5 minutos. Nota: GitHub Schedules puede tener retrasos.
    - cron: '*/5 * * * *'
  # Permite ejecutarlo manualmente para pruebas
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Necesario para hacer commit
    
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Crear archivo JSON
        run: |
          echo "{\"fecha\": \"$(date)\", \"status\": \"activo\"}" > datos.json

      - name: Commit y Push del JSON
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add datos.json
          # Solo comitea si hay cambios, para no fallar si el contenido es igual
          git diff --quiet && git diff --staged --quiet || git commit -m "Actualización automática de JSON: $(date)"
          git push
